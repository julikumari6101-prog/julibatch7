<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shop — LUXE</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root{--bg:#0a0a0a;--surface:#111111;--surface2:#1a1a1a;--accent:#c9a96e;--accent2:#e8c99a;--text:#f0ece4;--muted:#888;--border:#2a2a2a;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1.2rem 4rem;background:rgba(10,10,10,0.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);}
    .nav-logo{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:var(--accent);letter-spacing:0.08em;text-decoration:none;}
    .nav-links{display:flex;gap:2.5rem;list-style:none;}
    .nav-links a{color:var(--muted);text-decoration:none;font-size:0.88rem;letter-spacing:0.1em;text-transform:uppercase;transition:color 0.3s;}
    .nav-links a:hover,.nav-links a.active{color:var(--accent);}
    .cart-btn{background:var(--accent);color:#000;border:none;padding:0.6rem 1.4rem;font-family:'DM Sans',sans-serif;font-size:0.82rem;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:background 0.3s;display:inline-flex;align-items:center;gap:0.4rem;}
    .cart-btn:hover{background:var(--accent2);}
    .cart-count{background:#000;color:var(--accent);border-radius:50%;width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;}
    .page-header{padding:8rem 4rem 3rem;background:var(--surface);border-bottom:1px solid var(--border);}
    .breadcrumb{font-size:0.78rem;color:var(--muted);margin-bottom:1rem;}
    .breadcrumb a{color:var(--accent);text-decoration:none;}
    .page-title{font-family:'Playfair Display',serif;font-size:3rem;font-weight:900;margin-bottom:0.5rem;}
    .page-subtitle{color:var(--muted);}
    .shop-layout{display:grid;grid-template-columns:260px 1fr;}
    .sidebar{background:var(--surface);border-right:1px solid var(--border);padding:2.5rem 2rem;position:sticky;top:72px;height:fit-content;}
    .sidebar-section{margin-bottom:2.5rem;}
    .sidebar-title{font-size:0.75rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-bottom:1.2rem;padding-bottom:0.8rem;border-bottom:1px solid var(--border);}
    .filter-btn{display:block;width:100%;text-align:left;background:transparent;border:none;color:var(--muted);padding:0.55rem 0;font-family:'DM Sans',sans-serif;font-size:0.9rem;cursor:pointer;transition:color 0.3s;}
    .filter-btn:hover,.filter-btn.active{color:var(--accent);}
    .price-range{width:100%;accent-color:var(--accent);margin:0.5rem 0;}
    .price-display{display:flex;justify-content:space-between;font-size:0.82rem;color:var(--muted);margin-top:0.4rem;}
    .sort-select{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:0.7rem 1rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer;outline:none;}
    .products-area{padding:2.5rem 3rem;}
    .products-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border);}
    .results-count{font-size:0.88rem;color:var(--muted);}
    .results-count strong{color:var(--text);}
    .view-toggle{display:flex;gap:0.4rem;}
    .view-btn{background:transparent;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;cursor:pointer;transition:all 0.3s;font-size:1rem;}
    .view-btn.active,.view-btn:hover{background:var(--accent);border-color:var(--accent);color:#000;}
    .products-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;}
    .product-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;transition:all 0.35s;text-decoration:none;color:var(--text);display:block;}
    .product-card:hover{border-color:var(--accent);transform:translateY(-4px);}
    .product-img{height:220px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3.5rem;position:relative;}
    .product-badge{position:absolute;top:0.8rem;left:0.8rem;background:var(--accent);color:#000;font-size:0.68rem;font-weight:700;letter-spacing:0.1em;padding:0.2rem 0.5rem;text-transform:uppercase;}
    .wishlist-btn{position:absolute;top:0.8rem;right:0.8rem;background:var(--surface2);border:1px solid var(--border);color:var(--muted);width:32px;height:32px;cursor:pointer;font-size:0.9rem;transition:all 0.3s;}
    .wishlist-btn.active{background:var(--accent);border-color:var(--accent);}
    .product-info{padding:1.3rem;}
    .product-cat{font-size:0.7rem;color:var(--muted);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:0.4rem;}
    .product-name{font-family:'Playfair Display',serif;font-size:1.05rem;margin-bottom:0.3rem;}
    .stars{color:var(--accent);font-size:0.78rem;}
    .reviews{color:var(--muted);font-size:0.72rem;margin-left:0.3rem;}
    .product-price-row{display:flex;align-items:center;justify-content:space-between;margin-top:0.9rem;flex-wrap:wrap;gap:0.4rem;}
    .product-price{font-size:1.05rem;font-weight:700;color:var(--accent);}
    .product-old{font-size:0.82rem;color:var(--muted);text-decoration:line-through;margin-left:0.4rem;}
    .product-discount{font-size:0.7rem;color:#4caf50;font-weight:500;margin-left:0.4rem;}
    .add-to-cart{background:transparent;border:1px solid var(--border);color:var(--text);padding:0.45rem 0.9rem;font-family:'DM Sans',sans-serif;font-size:0.75rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;transition:all 0.3s;}
    .add-to-cart:hover{background:var(--accent);border-color:var(--accent);color:#000;}
    .pagination{display:flex;gap:0.5rem;margin-top:3rem;justify-content:center;}
    .page-btn{background:transparent;border:1px solid var(--border);color:var(--muted);width:40px;height:40px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:0.88rem;transition:all 0.3s;}
    .page-btn:hover,.page-btn.active{background:var(--accent);border-color:var(--accent);color:#000;}
    .cart-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.35s;backdrop-filter:blur(4px);}
    .cart-overlay.open{opacity:1;pointer-events:all;}
    .cart-drawer{position:fixed;top:0;right:0;bottom:0;width:420px;background:var(--surface);border-left:1px solid var(--border);z-index:201;transform:translateX(100%);transition:transform 0.4s cubic-bezier(0.16,1,0.3,1);display:flex;flex-direction:column;}
    .cart-drawer.open{transform:translateX(0);}
    .cart-header{display:flex;align-items:center;justify-content:space-between;padding:1.8rem 2rem;border-bottom:1px solid var(--border);}
    .cart-header h3{font-family:'Playfair Display',serif;font-size:1.4rem;}
    .cart-close{background:transparent;border:1px solid var(--border);color:var(--muted);width:36px;height:36px;cursor:pointer;font-size:1.1rem;transition:all 0.3s;}
    .cart-close:hover{background:var(--accent);border-color:var(--accent);color:#000;}
    .cart-items{flex:1;overflow-y:auto;padding:1.5rem 2rem;}
    .cart-empty{text-align:center;padding:4rem 0;color:var(--muted);}
    .cart-empty div{font-size:3rem;margin-bottom:1rem;}
    .cart-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border);align-items:center;}
    .cart-item-img{width:60px;height:60px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;border:1px solid var(--border);}
    .cart-item-info{flex:1;}
    .cart-item-name{font-size:0.9rem;font-weight:500;margin-bottom:0.2rem;}
    .cart-item-price{color:var(--accent);font-size:0.88rem;font-weight:700;}
    .cart-item-controls{display:flex;align-items:center;gap:0.5rem;margin-top:0.5rem;}
    .qty-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:26px;height:26px;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
    .qty-btn:hover{background:var(--accent);border-color:var(--accent);color:#000;}
    .qty-val{min-width:24px;text-align:center;font-size:0.88rem;}
    .remove-btn{background:transparent;border:none;color:var(--muted);cursor:pointer;margin-left:auto;font-size:1rem;padding:0.2rem;transition:color 0.3s;}
    .remove-btn:hover{color:#e74c3c;}
    .cart-footer{padding:1.5rem 2rem;border-top:1px solid var(--border);}
    .cart-subtotal{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;}
    .cart-subtotal .label{color:var(--muted);font-size:0.88rem;}
    .cart-subtotal .amount{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--accent);}
    .checkout-btn{width:100%;background:var(--accent);color:#000;border:none;padding:1rem;font-family:'DM Sans',sans-serif;font-size:0.9rem;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background 0.3s;}
    .checkout-btn:hover{background:var(--accent2);}
    .continue-btn{width:100%;background:transparent;color:var(--muted);border:1px solid var(--border);padding:0.8rem;font-family:'DM Sans',sans-serif;font-size:0.85rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;margin-top:0.8rem;transition:all 0.3s;}
    .continue-btn:hover{color:var(--text);border-color:var(--text);}
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--accent);color:#000;padding:0.9rem 1.8rem;font-weight:500;font-size:0.88rem;z-index:9999;transform:translateY(100px);opacity:0;transition:all 0.4s ease;}
    .toast.show{transform:translateY(0);opacity:1;}
    footer{background:var(--surface);border-top:1px solid var(--border);padding:2rem 4rem;}
    .footer-bottom{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:0.8rem;}
    .footer-links{display:flex;gap:2rem;}
    .footer-links a{color:var(--muted);text-decoration:none;transition:color 0.3s;}
    .footer-links a:hover{color:var(--accent);}
    @media(max-width:1000px){.shop-layout{grid-template-columns:1fr;}.sidebar{display:none;}.products-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:700px){nav{padding:1rem 1.5rem;}.nav-links{display:none;}.products-grid{grid-template-columns:1fr;}.products-area{padding:1.5rem;}.cart-drawer{width:100%;}.page-header{padding:6rem 1.5rem 2rem;}}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">LUXE</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="product.html" class="active">Shop</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <button class="cart-btn" onclick="openCart()">&#128722; Cart <span class="cart-count" id="cartCount">0</span></button>
  </nav>
  <div class="page-header">
    <div class="breadcrumb"><a href="index.html">Home</a> / Shop</div>
    <h1 class="page-title">All Products</h1>
    <p class="page-subtitle">Discover our complete collection of premium products</p>
  </div>
  <div class="shop-layout">
    <aside class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-title">Categories</div>
        <button class="filter-btn active" onclick="filterCat('all',this)">All Products</button>
        <button class="filter-btn" onclick="filterCat('Electronics',this)">Electronics</button>
        <button class="filter-btn" onclick="filterCat('Fashion',this)">Fashion</button>
        <button class="filter-btn" onclick="filterCat('Home & Living',this)">Home &amp; Living</button>
        <button class="filter-btn" onclick="filterCat('Beauty',this)">Beauty</button>
        <button class="filter-btn" onclick="filterCat('Sports',this)">Sports</button>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Price Range</div>
        <input type="range" class="price-range" min="0" max="10000" value="10000" id="priceRange" oninput="filterPrice(this.value)"/>
        <div class="price-display"><span>&#8377;0</span><span id="priceMax">&#8377;10,000</span></div>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Sort By</div>
        <select class="sort-select" onchange="sortProducts(this.value)">
          <option value="default">Default</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="rating">Top Rated</option>
          <option value="name">Name A-Z</option>
        </select>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-title">Rating</div>
        <button class="filter-btn active" onclick="filterRating(0,this)">All Ratings</button>
        <button class="filter-btn" onclick="filterRating(4,this)">4 Star and above</button>
        <button class="filter-btn" onclick="filterRating(5,this)">5 Star only</button>
      </div>
    </aside>
    <div class="products-area">
      <div class="products-toolbar">
        <div class="results-count">Showing <strong id="resultCount">0</strong> products</div>
        <div class="view-toggle">
          <button class="view-btn active" onclick="setView('grid',this)" title="Grid">&#8861;</button>
          <button class="view-btn" onclick="setView('list',this)" title="List">&#9776;</button>
        </div>
      </div>
      <div class="products-grid" id="productsGrid"></div>
      <div class="pagination">
        <button class="page-btn active">1</button>
        <button class="page-btn">2</button>
        <button class="page-btn">3</button>
        <button class="page-btn">&rsaquo;</button>
      </div>
    </div>
  </div>
  <div class="cart-overlay" id="cartOverlay" onclick="closeCart()"></div>
  <div class="cart-drawer" id="cartDrawer">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="cart-close" onclick="closeCart()">&#10005;</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-footer">
      <div class="cart-subtotal"><span class="label">Subtotal</span><span class="amount" id="cartTotal">&#8377;0</span></div>
      <button class="checkout-btn" onclick="checkout()">Proceed to Checkout &#8594;</button>
      <button class="continue-btn" onclick="closeCart()">Continue Shopping</button>
    </div>
  </div>
  <footer><div class="footer-bottom"><span>&#169; 2025 LUXE. All rights reserved.</span><div class="footer-links"><a href="index.html">Home</a><a href="contact.html">Contact</a><a href="#">Privacy</a></div></div></footer>
  <div class="toast" id="toast"></div>
  <script>
    var ALL_PRODUCTS=[
      {id:1,name:'Wireless Earbuds Pro',cat:'Electronics',price:2499,old:3999,emoji:'🎧',badge:'Hot',rating:5,reviews:124},
      {id:2,name:'Linen Casual Shirt',cat:'Fashion',price:1299,old:1999,emoji:'👔',badge:'New',rating:4,reviews:87},
      {id:3,name:'Ceramic Table Lamp',cat:'Home & Living',price:1799,old:2499,emoji:'💡',badge:'Sale',rating:5,reviews:56},
      {id:4,name:'Smart Watch Series 5',cat:'Electronics',price:5999,old:8499,emoji:'⌚',badge:'Top',rating:5,reviews:312},
      {id:5,name:'Natural Face Serum',cat:'Beauty',price:899,old:1299,emoji:'✨',badge:'New',rating:4,reviews:43},
      {id:6,name:'Canvas Backpack',cat:'Fashion',price:1599,old:2299,emoji:'🎒',badge:'Sale',rating:4,reviews:91},
      {id:7,name:'Bluetooth Speaker',cat:'Electronics',price:3499,old:4999,emoji:'🔊',badge:'Hot',rating:5,reviews:178},
      {id:8,name:'Silk Dress',cat:'Fashion',price:2199,old:3499,emoji:'👗',badge:'New',rating:4,reviews:64},
      {id:9,name:'Scented Candle Set',cat:'Home & Living',price:699,old:999,emoji:'🕯️',badge:'Sale',rating:5,reviews:201},
      {id:10,name:'Vitamin C Moisturizer',cat:'Beauty',price:1199,old:1599,emoji:'🧴',badge:'Top',rating:4,reviews:88},
      {id:11,name:'Yoga Mat Premium',cat:'Sports',price:1899,old:2799,emoji:'🧘',badge:'New',rating:5,reviews:145},
      {id:12,name:'Running Shoes',cat:'Sports',price:3299,old:4999,emoji:'👟',badge:'Hot',rating:4,reviews:267}
    ];
    var cart=JSON.parse(localStorage.getItem('luxe_cart')||'[]');
    var currentCat='all',currentMaxPrice=10000,currentSort='default',currentRating=0,wishlist={};
    function getFiltered(){
      var p=ALL_PRODUCTS.slice();
      if(currentCat!=='all')p=p.filter(function(x){return x.cat===currentCat;});
      p=p.filter(function(x){return x.price<=currentMaxPrice;});
      if(currentRating>0)p=p.filter(function(x){return x.rating>=currentRating;});
      if(currentSort==='price-asc')p.sort(function(a,b){return a.price-b.price;});
      else if(currentSort==='price-desc')p.sort(function(a,b){return b.price-a.price;});
      else if(currentSort==='rating')p.sort(function(a,b){return b.rating-a.rating;});
      else if(currentSort==='name')p.sort(function(a,b){return a.name.localeCompare(b.name);});
      return p;
    }
    function renderProducts(){
      var p=getFiltered();
      document.getElementById('resultCount').textContent=p.length;
      var grid=document.getElementById('productsGrid');
      if(p.length===0){grid.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:5rem;color:var(--muted)"><div style="font-size:3rem;margin-bottom:1rem">🔍</div><div>No products found. Try different filters.</div></div>';return;}
      grid.innerHTML=p.map(function(x){
        var disc=Math.round((1-x.price/x.old)*100);
        return '<a href="#" class="product-card" onclick="return false;">'+
          '<div class="product-img">'+x.emoji+
          '<div class="product-badge">'+x.badge+'</div>'+
          '<button class="wishlist-btn'+(wishlist[x.id]?' active':'')+'" onclick="event.preventDefault();toggleWishlist('+x.id+')" title="Wishlist">'+(wishlist[x.id]?'❤️':'🤍')+'</button>'+
          '</div><div class="product-info">'+
          '<div class="product-cat">'+x.cat+'</div>'+
          '<div class="product-name">'+x.name+'</div>'+
          '<div><span class="stars">'+'★'.repeat(x.rating)+'☆'.repeat(5-x.rating)+'</span><span class="reviews">('+x.reviews+')</span></div>'+
          '<div class="product-price-row">'+
          '<span><span class="product-price">₹'+x.price.toLocaleString()+'</span><span class="product-old">₹'+x.old.toLocaleString()+'</span><span class="product-discount">-'+disc+'%</span></span>'+
          '<button class="add-to-cart" onclick="event.preventDefault();addToCart('+x.id+')">Add</button>'+
          '</div></div></a>';
      }).join('');
    }
    function filterCat(cat,btn){
      currentCat=cat;
      var btns=document.querySelectorAll('.sidebar-section:first-child .filter-btn');
      for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
      btn.classList.add('active');renderProducts();
    }
    function filterPrice(val){currentMaxPrice=parseInt(val);document.getElementById('priceMax').textContent='₹'+parseInt(val).toLocaleString();renderProducts();}
    function sortProducts(val){currentSort=val;renderProducts();}
    function filterRating(r,btn){
      currentRating=r;
      var sec=btn.closest('.sidebar-section');
      var btns=sec.querySelectorAll('.filter-btn');
      for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
      btn.classList.add('active');renderProducts();
    }
    function setView(type,btn){
      var grid=document.getElementById('productsGrid');
      if(type==='list'){grid.style.gridTemplateColumns='1fr';}else{grid.style.gridTemplateColumns='';}
      var btns=document.querySelectorAll('.view-btn');
      for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
      btn.classList.add('active');
    }
    function toggleWishlist(id){wishlist[id]=!wishlist[id];renderProducts();showToast(wishlist[id]?'❤️ Added to wishlist':'Removed from wishlist');}
    function addToCart(id){
      var p=ALL_PRODUCTS.filter(function(x){return x.id===id;})[0];
      var found=false;
      for(var i=0;i<cart.length;i++){if(cart[i].id===id){cart[i].qty++;found=true;break;}}
      if(!found)cart.push({id:p.id,name:p.name,price:p.price,emoji:p.emoji,qty:1});
      localStorage.setItem('luxe_cart',JSON.stringify(cart));updateCartCount();renderCartDrawer();
      showToast(p.emoji+' '+p.name+' added to cart!');
    }
    function removeFromCart(id){cart=cart.filter(function(x){return x.id!==id;});localStorage.setItem('luxe_cart',JSON.stringify(cart));updateCartCount();renderCartDrawer();}
    function updateQty(id,delta){
      for(var i=0;i<cart.length;i++){if(cart[i].id===id){cart[i].qty+=delta;if(cart[i].qty<=0){removeFromCart(id);return;}break;}}
      localStorage.setItem('luxe_cart',JSON.stringify(cart));updateCartCount();renderCartDrawer();
    }
    function updateCartCount(){document.getElementById('cartCount').textContent=cart.reduce(function(s,i){return s+i.qty;},0);}
    function renderCartDrawer(){
      var c=document.getElementById('cartItems');
      if(cart.length===0){c.innerHTML='<div class="cart-empty"><div>🛒</div><p>Your cart is empty</p></div>';document.getElementById('cartTotal').textContent='₹0';return;}
      c.innerHTML=cart.map(function(i){return '<div class="cart-item"><div class="cart-item-img">'+i.emoji+'</div><div class="cart-item-info"><div class="cart-item-name">'+i.name+'</div><div class="cart-item-price">₹'+(i.price*i.qty).toLocaleString()+'</div><div class="cart-item-controls"><button class="qty-btn" onclick="updateQty('+i.id+',-1)">&#8722;</button><span class="qty-val">'+i.qty+'</span><button class="qty-btn" onclick="updateQty('+i.id+',1)">+</button></div></div><button class="remove-btn" onclick="removeFromCart('+i.id+')">🗑</button></div>';}).join('');
      var total=cart.reduce(function(s,i){return s+i.price*i.qty;},0);
      document.getElementById('cartTotal').textContent='₹'+total.toLocaleString();
    }
    function openCart(){document.getElementById('cartOverlay').classList.add('open');document.getElementById('cartDrawer').classList.add('open');renderCartDrawer();}
    function closeCart(){document.getElementById('cartOverlay').classList.remove('open');document.getElementById('cartDrawer').classList.remove('open');}
    function checkout(){if(cart.length===0){showToast('Your cart is empty!');return;}cart=[];localStorage.setItem('luxe_cart',JSON.stringify(cart));updateCartCount();renderCartDrawer();closeCart();showToast('🎉 Order placed! Thank you!');}
    function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2800);}
    renderProducts();updateCartCount();
  </script>
</body>
</html>
